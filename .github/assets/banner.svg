<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Planka MCP Server — connect AI assistants to your Planka Kanban board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c4966"/>
      <stop offset="1" stop-color="#0d2a3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- Kanban board motif -->
  <g transform="translate(80, 78)">
    <rect x="0"   y="0"  width="44" height="144" rx="8" fill="#ffffff" opacity="0.08"/>
    <rect x="60"  y="0"  width="44" height="144" rx="8" fill="#ffffff" opacity="0.08"/>
    <rect x="120" y="0"  width="44" height="144" rx="8" fill="#ffffff" opacity="0.08"/>
    <rect x="8"   y="10" width="28" height="30" rx="5" fill="url(#accent)"/>
    <rect x="8"   y="48" width="28" height="30" rx="5" fill="#ffffff" opacity="0.45"/>
    <rect x="68"  y="10" width="28" height="30" rx="5" fill="#ffffff" opacity="0.45"/>
    <rect x="68"  y="48" width="28" height="30" rx="5" fill="url(#accent)"/>
    <rect x="68"  y="86" width="28" height="30" rx="5" fill="#ffffff" opacity="0.45"/>
    <rect x="128" y="10" width="28" height="30" rx="5" fill="#ffffff" opacity="0.45"/>
  </g>

  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="320" y="138" font-size="64" font-weight="700" fill="#ffffff">Planka MCP Server</text>
    <text x="322" y="186" font-size="28" font-weight="400" fill="#9fd4ef">Connect AI assistants to your Planka Kanban board</text>
  </g>
</svg>
